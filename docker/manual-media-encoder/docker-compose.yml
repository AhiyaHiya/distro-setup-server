version: '3.9'

services:
  manual-media-encoder:
    build:
      context: .
      dockerfile: Dockerfile
    image: manual-media-encoder:latest        # Fixed: underscore
    container_name: manual-media-encoder      # Fixed: consistent
    user: "1000:1000"                         # ADD: Prevent root-owned files (adjust UID/GID)
    devices:
      - /dev/sr0:/dev/sr0
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/pool/samba/users/family/Media/Entertainment/Movies:/final-output  # Final (HDD)
      - makemkv-data:/root/.MakeMKV
    tty: true
    stdin_open: true
    privileged: false
    restart: "no"                                     # Interactive tool, no auto-restart

volumes:
  makemkv-data:

