services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: "110:111"
    group_add:
      - '993'
    network_mode: 'host'
    volumes:
      - /opt/jellyfin/config:/config
      - /opt/jellyfin/cache:/cache
      - type: bind
        source: /mnt/pool/samba/users/family/Media/Entertainment
        target: /media
    restart: 'unless-stopped'
    environment:
      - JELLYFIN_PublishedServerUrl=http://jrjelly.mooo.com:8096
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
