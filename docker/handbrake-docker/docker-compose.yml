services:
  handbrake:
    image: jlesage/handbrake
    container_name: handbrake
    ports:
      - "5801:5800"
    volumes:
      - "/docker/appdata/handbrake:/config:rw"
      - "/home/user:/storage:ro"
      - "/home/jaimerios/Docker/HandBrake/watch:/watch:rw"
      - "/home/jaimerios/Docker/HandBrake/output:/output:rw"
      - "/home/jaimerios/Docker/makemkv/output:/makemkv-output:rw"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card1:/dev/dri/card1
    restart: no
